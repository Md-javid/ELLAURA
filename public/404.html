<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Ellaura</title>
    <script>
      // GitHub Pages SPA routing trick:
      // Save the full URL to sessionStorage, then redirect to the base (index.html).
      // The main index.html will read it back and restore the route via history.replaceState.
      var segmentCount = 1; // number of path segments in the repo name (/ELLAURA)
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
